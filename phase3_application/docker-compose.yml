version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: vital_lens_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-vitalensai}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-develop123}
      POSTGRES_DB: ${DB_NAME:-vital_lens_ai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/docker-init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-vitalensai} -d ${DB_NAME:-vital_lens_ai}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vital_lens_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: vital_lens_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vital_lens_network

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: vital_lens_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vital_lens_network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vital_lens_backend
    environment:
      DATABASE_URL: postgresql://${DB_USER:-vitalensai}:${DB_PASSWORD:-develop123}@postgres:5432/${DB_NAME:-vital_lens_ai}
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - vital_lens_network
    command: >
      sh -c "if [ -f alembic.ini ]; then alembic upgrade head; else echo 'alembic.ini not found, skipping migrations'; fi && \
             uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  # Celery Worker (for async tasks)
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vital_lens_celery
    environment:
      DATABASE_URL: postgresql://${DB_USER:-vitalensai}:${DB_PASSWORD:-develop123}@postgres:5432/${DB_NAME:-vital_lens_ai}
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
    depends_on:
      - postgres
      - redis
      - rabbitmq
    volumes:
      - ./backend:/app
    networks:
      - vital_lens_network
    command: celery -A tasks worker --loglevel=info

  # Celery Beat (for scheduled tasks)
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vital_lens_celery_beat
    environment:
      DATABASE_URL: postgresql://${DB_USER:-vitalensai}:${DB_PASSWORD:-develop123}@postgres:5432/${DB_NAME:-vital_lens_ai}
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
    depends_on:
      - postgres
      - redis
      - rabbitmq
    volumes:
      - ./backend:/app
    networks:
      - vital_lens_network
    command: celery -A tasks beat --loglevel=info

  # React Frontend (Development)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vital_lens_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      # When the frontend dev server runs inside Docker but the browser is on
      # the host, the JS must call a host-accessible address. On macOS use
      # `host.docker.internal` so requests reach the backend mapped to the
      # host's port 8000. If you run frontend locally, set VITE_API_URL to
      # `http://localhost:8000/api/v1` instead.
      # For browser-based requests (your browser running on the host), use
      # localhost so the browser can reach the backend mapped to host port 8000.
      VITE_API_URL: http://localhost:8000/api/v1
    networks:
      - vital_lens_network
    command: npm run dev

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: vital_lens_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - vital_lens_network

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  vital_lens_network:
    driver: bridge
